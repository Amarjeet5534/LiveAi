version: '3.8'

services:
  # Backend API
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - DEBUG=False
      - STRICT_MODE=True
    volumes:
      - ./liveai.db:/app/liveai.db
      - ./data:/app/data
      - ./uploads:/app/uploads
    depends_on:
      - ollama
    networks:
      - liveai-network
    restart: unless-stopped

  # Frontend (Nginx)
  frontend:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    networks:
      - liveai-network
    restart: unless-stopped

  # Ollama LLM Service
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - liveai-network
    restart: unless-stopped
    # Initialize with phi3 model on startup
    entrypoint: sh -c 'ollama serve & sleep 10; ollama pull phi3; wait'

  # Optional: PostgreSQL for production
  # postgres:
  #   image: postgres:15-alpine
  #   environment:
  #     POSTGRES_DB: liveai
  #     POSTGRES_USER: liveai_user
  #     POSTGRES_PASSWORD: secure_password
  #   volumes:
  #     - postgres-data:/var/lib/postgresql/data
  #   networks:
  #     - liveai-network
  #   restart: unless-stopped

networks:
  liveai-network:
    driver: bridge

volumes:
  ollama-data:
  # postgres-data:

# Usage:
# docker-compose up -d          # Start all services
# docker-compose down           # Stop all services
# docker-compose logs -f api    # View API logs
# docker-compose ps             # Check status
